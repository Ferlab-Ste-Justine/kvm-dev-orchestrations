<system>
  log_level info
</system>

<source>
  @type http
  @label @audit
  port 4443
  bind 0.0.0.0
  <transport tls>
    ca_path /opt/server-credentials/ca.crt
    cert_path /opt/server-credentials/server.crt
    private_key_path /opt/server-credentials/server.key
    client_cert_auth true
  </transport>
  body_size_limit 32m
  add_http_headers true
  <parse>
    @type json
    time_key time
    time_format %iso8601
    keep_time_key true
  </parse>
</source>

<label @debug>
  <match **>
    @type copy

    <store>
      @type stdout
      <format>
        @type json
      </format>
    </store>

    <store>
      @type relabel
      @label @audit
    </store>
  </match>
</label>

<label @audit>
  <filter /^$|^audit$/>
    @type record_transformer
    enable_ruby true
    <record>
      _action_undefined ${record.dig('api','name').nil? || record.dig('api','name') == ''}
    </record>
  </filter>

  <filter /^$|^audit$/>
    @type grep
    <exclude>
      key     $.api.name
      pattern ^(AccountInfo|AssumeRole|GetBucketEncryption|GetBucketLocation|GetBucketObjectLockConfig|GetBucketPolicy|GetBucketObjectLockConfig|GetBucketQuotaConfig|GetBucketReplicationConfig|GetBucketTagging|GetBucketVersioning|GetGroup|GetLocks|GetMetrics|GetObjectLegalHold|GetObjectRetention|GetObjectTagging|GetUserInfo|HeadObject|HealthCheck|HealObject|KMSStatus|ListUsers|ListGroups|ListObjectsV2|ListObjectVersions|ServerInfo|StorageInfo|SiteReplication|ReplicateObject|InfoCannedPolicy)$
    </exclude>

    <exclude>
      key _action_undefined
      pattern ^true$
    </exclude>
  </filter>

  <filter /^$|^audit$/>
    @type record_transformer
    enable_ruby true
    renew_record true
    <record>
      time         ${record['time']}
      @timestamp   ${record['time']}
      #AddUser, AddCannedPolicy, DeleteBucket, DeleteMultipleObjects, GetParquetFile, GetObject, PutBucket, PutObject, RemoveUser, RemoveCannedPolicy, SetPolicyForUserOrGroup, SetGroupStatus, UpdateGroupMembers
      action       ${record.dig('api','name') == "GetObject" && record['requestPath'].to_s.match?(%r{^(?:\/[^\/]+)+\/part-[^\/]+\.parquet$}) ? 'GetParquetFile' : record.dig('api','name')}
      
      bucket       ${record.dig('api','bucket')}
      object       ${record.dig('api','object')}
      objects      ${record.dig('api','objects')}
      parquet_file ${record.dig('api','name') == "GetObject" && record['requestPath'].to_s.match?(%r{^(?:\/[^\/]+)+\/part-[^\/]+\.parquet$}) ? record['requestPath'].sub(%r{/part-[^/]+\.parquet$}, '') : nil}
      user         ${record.dig('requestQuery','isGroup') == 'true' ? record.dig('requestQuery','accessKey') : record.dig('requestQuery','accessKey') || record.dig('requestQuery','userOrGroup')}
      group        ${record.dig('requestQuery','isGroup') == 'true' ? record.dig('requestQuery','userOrGroup') || record.dig('requestQuery','group') : record.dig('requestQuery','group')}
      status       ${record.dig('requestQuery','status')}
      policies     ${(record.dig('requestQuery','policyName') || record.dig('tags','policyName')).to_s.split(',').map { |s| s.strip }.reject { |s| s.empty? }}
      group_op     ${record.dig('tags','PutObject') ? 'put' : (record.dig('tags','DeleteObject') ? 'delete' : nil)}
      group_alt    ${record.dig('api','name') == "UpdateGroupMembers" ? (record.dig('tags','PutObject') ? record.dig('tags','PutObject')[%r{name=config\/iam\/groups\/([^\/]+)\/members\.json,pool=\d+,set=\d+},1] : record.dig('tags','DeleteObject')[%r{name=config\/iam\/groups\/([^\/]+)\/members\.json,pool=\d+,set=\d+},1]) : nil}  

      client_user  ${record['parentUser'] || record['accessKey']}
      client       ${{ "user_agent" => record["userAgent"], "remote_host" => record["remotehost"], "real_ip" => record.dig('requestHeader','X-Real-Ip'), "forwarded_for" => record.dig('requestHeader','X-Forwarded-For') }}
      
      request_id   ${record['requestID']}
      status_code  ${record.dig('api','statusCode')}
      
      server       ${{ "host" => record['requestHost'], "minio_version" => record['HTTP_X_MINIO_VERSION'] }}
    </record>
  </filter>

  <match /^$|^audit$/>
    @type copy

    <store>
      @type stdout
      <format>
        @type json
      </format>
    </store>

    @include "#{ENV['OPENSEARCH_STORAGE'] == 'true' ? '/fluentd/etc/fluentd_opensearch.conf' : '/fluentd/etc/fluentd_null.conf'}"

    <store>
      @type rewrite_tag_filter
      <rule>
        key action
        pattern ^AddUser
        tag alert.add_user
      </rule>
      <rule>
        key action
        pattern ^AddCannedPolicy
        tag alert.add_canned_policy
      </rule>
      <rule>
        key action
        pattern ^GetObject
        tag alert.get_object
      </rule>
      <rule>
        key action
        pattern ^GetParquetFile
        tag alert.get_parquet_file
      </rule>
      <rule>
        key action
        pattern ^RemoveUser
        tag alert.remove_user
      </rule>
      <rule>
        key action
        pattern ^RemoveCannedPolicy
        tag alert.remove_canned_policy
      </rule>
      <rule>
        key action
        pattern ^SetPolicyForUserOrGroup
        tag alert.set_policy_for_user_or_group
      </rule>
      <rule>
        key action
        pattern ^UpdateGroupMembers
        tag alert.update_group_members
      </rule>
    </store>
  </match>

  @include "#{ENV['ALERTS'] == 'true' ? '/fluentd/etc/fluentd_alert.conf' : '/fluentd/etc/fluentd_null.conf'}"
</label>