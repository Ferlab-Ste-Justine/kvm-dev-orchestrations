<filter alert.add_user>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time    ${record['time']}
    account ${record['client_user']}
    event   "Minio User Creation"
    details ${"Created user '#{record['user']}'"}
  </record>
</filter>

<filter alert.add_canned_policy>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time    ${record['time']}
    account ${record['client_user']}
    event   "Minio Policies Upsert"
    details ${sprintf("Created or updated policies: %s", Array(record['policies']).join(', '))}
  </record>
</filter>

<filter alert.get_object>
  @type grep
  @include /fluentd/etc/fluentd_alert_download_filters.conf
</filter>

<filter alert.get_object>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time    ${record['time']}
    account ${record['client_user']}
    event   "Minio Object Download"
    details ${"Downloaded object '#{record['object']}' from bucket '#{record['bucket']}'"}
  </record>
</filter>

<filter alert.get_parquet_file>
  @type grep
  @include /fluentd/etc/fluentd_alert_download_filters.conf
</filter>

<filter alert.get_parquet_file>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time      ${record['time']}
    account   ${record['client_user']}
    event     "Minio Parquet File Access"
    details   ${"Accessed the parquet file '#{record['parquet_file']}' in the last 10 minutes"}
    dedup_key ${"#{record['client_user']}-#{record['parquet_file']}"}
  </record>
</filter>

<filter alert.remove_user>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time    ${record['time']}
    account ${record['client_user']}
    event   "Minio User Deletion"
    details ${"Deleted user '#{record['user']}'"}
  </record>
</filter>

<filter alert.remove_canned_policy>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time    ${record['time']}
    account ${record['client_user']}
    event   "Minio Policies Deletion"
    details ${sprintf("Deleted policies: %s",  Array(record['policies']).join(', '))}
  </record>
</filter>

<filter alert.set_policy_for_user_or_group>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time    ${record['time']}
    account ${record['client_user']}
    event   ${sprintf("Minio %s Policies Assignment", record['user'] ? 'User' : 'Group')}
    details ${sprintf("Changed assigned policies for %s '%s'. They are now: %s",  record['user'] ? 'user' : 'group', record['user'] ? record['user'] : record['group'], Array(record['policies']).join(', '))}
  </record>
</filter>

<filter alert.update_group_members>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time    ${record['time']}
    account ${record['client_user']}
    event   ${sprintf("Minio Group %s", record['group_op'] == 'delete' ? 'Deletion' : 'Upsert')}
    details ${sprintf("%s group '%s'.", record['group_op'] == 'delete' ? 'deleted' : 'upserted',  record['group_alt'])}
  </record>
</filter>

<match alert.*>
  @type http
  endpoint http://127.0.0.1:8181
  content_type "application/json"
  open_timeout 2
  read_timeout 2
  json_array true

  <buffer tag>
    @type memory
    flush_mode immediate
    flush_thread_count 1
    chunk_limit_records 1
    chunk_limit_size 64k
    total_limit_size 16m
    queued_chunks_limit_size 128
    overflow_action block
  </buffer>

  headers_from_placeholders {"X-Fluentd-Tag":"${tag}"}

  <format>
    @type json
  </format>
</match>