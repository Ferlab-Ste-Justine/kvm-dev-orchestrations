<filter alert.add_user>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time          ${record['time']}
    slack_title   "Minio User Creation"
    slack_message ${"[#{Time.parse(record['time']).strftime('%Y-%m-%d %H:%M:%S')}] Account '#{record['client_user']}' created user '#{record['user']}'"}
  </record>
</filter>

<filter alert.add_canned_policy>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time          ${record['time']}
    slack_title   "Minio Policies Upsert"
    slack_message ${sprintf("[%s] Account '%s' created or updated policies: %s",  Time.parse(record['time']).strftime('%Y-%m-%d %H:%M:%S'), record['client_user'], Array(record['policies']).join(', '))}
  </record>
</filter>

<filter alert.get_object>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time          ${record['time']}
    slack_title   "Minio Object Download"
    slack_message ${"[#{Time.parse(record['time']).strftime('%Y-%m-%d %H:%M:%S')}] Account '#{record['client_user']}' downloaded object '#{record['object']}' from bucket '#{record['bucket']}'"}
  </record>
</filter>

<filter alert.get_parquet_file>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time          ${record['time']}
    slack_title   "Minio Parquet File Access"
    slack_message ${"[#{Time.parse(record['time']).strftime('%Y-%m-%d %H:%M:%S')}] Account '#{record['client_user']}' accessed the parquet file '#{record['parquet_file']}' in the last 10 minutes"}
    dedup_key ${"#{record['client_user']}-#{record['parquet_file']}"}
  </record>
</filter>

<filter alert.remove_user>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time          ${record['time']}
    slack_title   "Minio User Deletion"
    slack_message ${"[#{Time.parse(record['time']).strftime('%Y-%m-%d %H:%M:%S')}] Account '#{record['client_user']}' deleted user '#{record['user']}'"}
  </record>
</filter>

<filter alert.remove_canned_policy>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time          ${record['time']}
    slack_title   "Minio Policies Deletion"
    slack_message ${sprintf("[%s] Account '%s' deleted policies: %s",  Time.parse(record['time']).strftime('%Y-%m-%d %H:%M:%S'), record['client_user'], Array(record['policies']).join(', '))}
  </record>
</filter>

<filter alert.set_policy_for_user_or_group>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time          ${record['time']}
    slack_title   ${sprintf("Minio %s Policies Assignment", record['user'] ? 'User' : 'Group')}
    slack_message ${sprintf("[%s] Account '%s' changed assigned policies for %s '%s'. They are now: %s",  Time.parse(record['time']).strftime('%Y-%m-%d %H:%M:%S'), record['client_user'], record['user'] ? 'user' : 'group', record['user'] ? record['user'] : record['group'], Array(record['policies']).join(', '))}
  </record>
</filter>

<filter alert.update_group_members>
  @type record_transformer
  enable_ruby true
  renew_record true
  <record>
    time          ${record['time']}
    slack_title   ${sprintf("Minio Group %s", record['group_op'] == 'delete' ? 'Deletion' : 'Upsert')}
    slack_message ${sprintf("[%s] Account '%s' %s group '%s'.", Time.parse(record['time']).strftime('%Y-%m-%d %H:%M:%S'), record['client_user'], record['group_op'] == 'delete' ? 'deleted' : 'upserted',  record['group_alt'])}
  </record>
</filter>

<match alert.*>
  @type http
  endpoint http://127.0.0.1:8181
  content_type "application/json"
  open_timeout 2
  read_timeout 2
  json_array true

  <buffer tag>
    @type memory
    flush_mode immediate
    flush_thread_count 1
    chunk_limit_records 1
    chunk_limit_size 64k
    total_limit_size 16m
    queued_chunks_limit_size 128
    overflow_action block
  </buffer>

  headers_from_placeholders {"X-Fluentd-Tag":"${tag}"}

  <format>
    @type json
  </format>
</match>
