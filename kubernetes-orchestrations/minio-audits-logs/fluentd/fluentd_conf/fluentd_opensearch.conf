<store>
    @type opensearch
    host "#{ENV['FLUENT_OPENSEARCH_HOST']}"
    port "#{ENV['FLUENT_OPENSEARCH_PORT']}"
    scheme "#{ENV['FLUENT_OPENSEARCH_SCHEME']}"
    ssl_verify "#{ENV['FLUENT_OPENSEARCH_SSL_VERIFY']}"
    ssl_version "#{ENV['FLUENT_OPENSEARCH_SSL_VERSION']}"
    ca_file "#{ENV['FLUENT_OPENSEARCH_CA_PATH']}"
    client_cert "#{ENV['FLUENT_OPENSEARCH_CLIENT_CERT']}"
    client_key "#{ENV['FLUENT_OPENSEARCH_CLIENT_KEY']}"
    logstash_format true
    logstash_prefix "#{ENV['FLUENT_OPENSEARCH_LOGSTASH_PREFIX']}"
    include_tag_key true
    tag_key fluent_tag
    <buffer>
    @type memory
    flush_interval 5s
    retry_max_interval 30s
    retry_forever true
    </buffer>
</store>