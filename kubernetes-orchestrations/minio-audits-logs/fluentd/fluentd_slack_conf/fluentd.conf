<system>
  log_level info
</system>

<source>
  @type http
  @label @audit
  port 8080
  bind 127.0.0.1
  body_size_limit 32m
  add_http_headers true
  <parse>
    @type json
    time_key time
    time_format %iso8601
    keep_time_key true
  </parse>
</source>

<label @audit>
  <match **>
    @type copy

    <store>
      @type stdout
      <format>
        @type json
      </format>
    </store>

    <store>
      @type slack
      token "#{ENV['SLACK_TOKEN']}"
      channel "#{ENV['SLACK_CHANNEL']}"
      username minio-audit-logs
      icon_emoji :ferlabbot:
      message %s
      message_keys slack_message
      title %s
      title_keys slack_title
      flush_interval 1s
    </store>
  </match>
</label>

